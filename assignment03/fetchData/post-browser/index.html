<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Post Browser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1 class="title">Post Browser</h1>

      <div class="post-box">
        <!-- Top info -->
        <div class="top-info">
          <span id="topic">Post</span>
          <span id="counter">1</span> /
          <span id="totalCount">10</span>
        </div>
        <div
          id="error-message"
          data-testid="error-message"
          class="hidden"
        ></div>

        <!-- Loader -->
        <div id="post-loader" class="loader hidden">Loading...</div>

        <!-- Post content -->
        <div id="post-text-content">
          <h2 id="post-title">Sample Post Title</h2>
          <p id="post-content">
            This is a sample post content. Click comments to see replies.
          </p>
        </div>

        <!-- Action buttons -->
        <div class="actions">
          <button id="refresh-btn" data-testid="refresh-btn">Refresh</button>
          <button id="comments-btn" data-testid="comments-btn">Comments</button>
        </div>

        <!-- Comments -->
        <div id="comments-container" class="hidden"></div>

        <!-- Navigation -->
        <div class="navigation">
          <button id="next-btn" data-testid="next-btn">Next →</button>
          <button id="prev-btn" data-testid="prev-btn">← Back</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
